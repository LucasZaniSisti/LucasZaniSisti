name: Generate X-Wing Graph

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}

          outputs: |
            dist/xwing.svg
            dist/xwing-dark.svg?palette=github-dark

      - name: Push output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: xwing-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
